<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1024px; height: 500px; overflow: hidden; }
  .wrap {
    width: 1024px; height: 500px;
    background: radial-gradient(120% 140% at 80% 20%, #16314f 0%, #0d1a2e 45%, #060e18 75%, #04090f 100%);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 70px; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff;
    position: relative;
  }
  .code { position: absolute; color: rgba(120,200,140,0.10); font-family: 'Consolas', monospace; font-weight: 700; }
  .c1 { top: 40px; left: 60px; font-size: 26px; } .c2 { bottom: 50px; left: 90px; font-size: 22px; }
  .c3 { top: 90px; right: 360px; font-size: 20px; } .c4 { bottom: 90px; right: 330px; font-size: 24px; }
  .left { max-width: 560px; z-index: 2; }
  .brand { display: flex; align-items: center; gap: 16px; margin-bottom: 22px; }
  .brand img { width: 64px; height: 64px; border-radius: 50%; border: 3px solid #58cc02; }
  .brand span { font-size: 34px; font-weight: 800; color: #58cc02; letter-spacing: -0.5px; }
  h1 { font-size: 46px; font-weight: 800; line-height: 1.1; margin-bottom: 18px; letter-spacing: -1px; }
  h1 .g { color: #58cc02; }
  .tag { font-size: 19px; color: #b9c9da; line-height: 1.45; margin-bottom: 26px; }
  .pills { display: flex; gap: 12px; }
  .pill { background: rgba(88,204,2,0.14); border: 1px solid rgba(88,204,2,0.4); color: #9be15d;
    padding: 8px 16px; border-radius: 999px; font-size: 15px; font-weight: 700; }
  .mascot { width: 340px; height: 340px; z-index: 2; }
  .mascot img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 16px 40px rgba(0,0,0,0.5)); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="code c1">{ } if (x) return;</div>
    <div class="code c2">for (let i=0; i&lt;n; i++)</div>
    <div class="code c3">=&gt; true</div>
    <div class="code c4">const dev = you;</div>
    <div class="left">
      <div class="brand">
        <img src="https://trilhadev.app.br/logoararadev.jpeg" alt="AraraDev" />
        <span>AraraDev</span>
      </div>
      <h1>Aprenda a programar <span class="g">de verdade</span></h1>
      <div class="tag">Trilha gamificada do zero aos fundamentos técnicos — lógica, algoritmos, SQL e mais. Sem depender de IA.</div>
      <div class="pills">
        <div class="pill">119 lições</div>
        <div class="pill">12 fases</div>
        <div class="pill">100% grátis</div>
      </div>
    </div>
    <div class="mascot"><img src="https://trilhadev.app.br/logoararadev.jpeg" alt="" style="border-radius:50%;border:6px solid rgba(88,204,2,0.5);" /></div>
  </div>
</body>
</html>
