<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>TrilhaDev — Trilha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <div id="app-shell">
    <header class="topbar">
      <div class="topbar-brand">
        <img src="logoararadev.jpeg" class="brand-mascote" alt="TrilhaDev" />
        <span class="brand-name">TrilhaDev</span>
      </div>

      <div class="topbar-widgets">
        <div class="streak-card">
          <div class="streak-card-value">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#ff9800"><path d="M17.66 11.2c-.23-.3-.51-.56-.77-.82-.67-.6-1.43-1.03-2.07-1.66C13.33 7.26 13 4.85 13.95 3c-.95.23-1.78.75-2.49 1.32-2.59 2.08-3.61 5.75-2.39 8.9.04.1.08.2.08.33 0 .22-.15.42-.35.5-.23.1-.47.04-.66-.12a.58.58 0 0 1-.14-.17c-1.13-1.43-1.31-3.48-.55-5.12C5.78 10 4.87 12.3 5 14.47c.06.5.12 1 .29 1.5.14.6.41 1.2.71 1.73 1.08 1.73 2.95 2.97 4.96 3.22 2.14.27 4.43-.17 6.08-1.64 1.64-1.43 2.3-3.6 1.7-5.69l-.07-.35c-.1-.33-.2-.66-.01-.98z"/></svg>
            <span id="streak-num">0</span>
          </div>
        </div>

        <div class="xp-card">
          <div class="xp-card-top">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#ffc800"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <span id="xp-text">0 XP</span>
            <span id="xp-level" class="xp-level-label">Iniciante</span>
          </div>
          <div class="xp-bar-wrap">
            <div id="xp-bar" class="xp-bar-fill" style="width:0%"></div>
          </div>
        </div>
      </div>
    </header>

    <main id="path"></main>

    <nav class="bottombar">
      <button id="nav-trilha" class="active" data-nav="trilha">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 20l-5-2V4l5 2 6-2 5 2v14l-5-2-6 2z"/><path d="M9 4v16M15 6v14"/></svg>
        <span>Trilha</span>
      </button>
      <button id="nav-conquistas" data-nav="conquistas">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M7 5H4a2 2 0 0 0 0 4h.5M17 5h3a2 2 0 0 1 0 4h-.5"/><path d="M8 21h8M12 17v4"/></svg>
        <span>Conquistas</span>
      </button>
      <button id="nav-perfil" data-nav="perfil">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Perfil</span>
      </button>
      <button id="nav-config" data-nav="config">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82A1.65 1.65 0 0 0 3 13.09H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Config</span>
      </button>
    </nav>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal" class="modal"></div>
  </div>

  <div id="toast-container"></div>

  <div id="lesson-screen" class="hidden">
    <div class="ls-header">
      <button class="ls-close" onclick="closeLessonScreen()" aria-label="Fechar lição">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="ls-progress-wrap">
        <div class="ls-progress-fill" id="ls-progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="ls-body" id="ls-body"></div>
    <div class="ls-footer" id="ls-footer">
      <button class="ls-verify-btn" id="ls-verify-btn" disabled onclick="_lsVerify()">VERIFICAR</button>
    </div>
    <div class="ls-feedback" id="ls-feedback"></div>
  </div>

  <script src="data.js?v=4"></script>
  <script src="app.js?v=4"></script>
  <script src="forest.js?v=4"></script>
</body>
</html>
